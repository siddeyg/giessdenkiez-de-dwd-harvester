name: harvest bonn (daily)

on:
  schedule:
    - cron: "0 3 * * *"  # 3am UTC daily — fresh DWD data available by ~2am UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH tunnel via VPS
        # GitHub Actions runners have no IPv6. Supabase free tier DB is IPv6-only.
        # Tunnel through powersrv (152.53.117.22) which has IPv6 connectivity.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 152.53.117.22 >> ~/.ssh/known_hosts
          ssh -fN \
            -L 5433:db.amkcbaxqgdpmmkmafnue.supabase.co:5432 \
            -i ~/.ssh/id_ed25519 \
            info@152.53.117.22
          # Wait for tunnel to be ready
          for i in $(seq 1 10); do
            timeout 1 bash -c "echo > /dev/tcp/127.0.0.1/5433" 2>/dev/null && echo "Tunnel ready" && break
            sleep 1
          done

      - name: Build harvester image
        run: |
          cd harvester && docker build \
            --build-arg SURROUNDING_SHAPE_FILE='/app/assets/Baumstandorte_Bonn.shp' \
            --tag gdk-dwd-harvester:bonn .

      - name: Run harvester
        run: |
          docker run \
            --network host \
            --env PG_SERVER='127.0.0.1' \
            --env PG_PORT='5433' \
            --env PG_USER='postgres' \
            --env PG_PASS='${{ secrets.DB_PASSWORD }}' \
            --env PG_DB='postgres' \
            --env SUPABASE_URL='https://amkcbaxqgdpmmkmafnue.supabase.co' \
            --env SUPABASE_SERVICE_ROLE_KEY='${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
            --env SUPABASE_BUCKET_NAME='data_assets' \
            --env MAPBOXUSERNAME='giessdenkiez' \
            --env MAPBOXTOKEN='${{ secrets.MAPBOX_SECRET_TOKEN }}' \
            --env MAPBOXTILESET='bonn_trees' \
            --env MAPBOXLAYERNAME='trees' \
            --env WEATHER_HARVEST_LAT='50.7374' \
            --env WEATHER_HARVEST_LNG='7.0982' \
            --env SURROUNDING_SHAPE_FILE='/app/assets/buffer.shp' \
            --env LIMIT_DAYS='30' \
            --env SKIP_MAPBOX='False' \
            --env OUTPUT='True' \
            --env LOGGING='INFO' \
            gdk-dwd-harvester:bonn
